<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Plaza - Live</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; }
        .header { padding: 20px; border-bottom: 1px solid #0f0; display: flex; justify-content: space-between; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { border: 1px solid #0f0; padding: 10px; border-radius: 10px; background: #050505; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .add-btn { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: #0f0; border-radius: 50%; font-size: 30px; cursor: pointer; border: none; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 10; }
        .modal-content { background: #000; border: 2px solid #0f0; padding: 20px; width: 300px; border-radius: 15px; }
        input, textarea { width: 100%; margin: 10px 0; background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SIGMA PLAZA</h1>
        <button onclick="location.href='index.html'" style="background:red; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Exit</button>
    </div>

    <div id="posts-container" class="container"></div>

    <button class="add-btn" onclick="document.getElementById('modal').style.display='flex'">+</button>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 style="color:#0f0">Yangi Post</h2>
            <input type="text" id="name" placeholder="Nomi">
            <input type="file" id="file" accept="image/*">
            <textarea id="bio" placeholder="Tavsif"></textarea>
            <button id="post-btn" style="width:100%; background:#0f0; padding:10px; font-weight:bold; cursor:pointer;">POST QILISH</button>
            <p onclick="document.getElementById('modal').style.display='none'" style="text-align:center; color:red; cursor:pointer;">Bekor qilish</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // SIZNING MAXSUS FIREBASE MA'LUMOTLARINGIZ
        const firebaseConfig = {
            projectId: "roblox-trade-plaza",
            storageBucket: "roblox-trade-plaza.appspot.com",
            appId: "1:273821035782:web:2f0367283920" // Bu taxminiy, agar xato bersa srazu ayting
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "posts");

        document.getElementById('post-btn').addEventListener('click', async () => {
            const name = document.getElementById('name').value;
            const bio = document.getElementById('bio').value;
            const file = document.getElementById('file').files[0];
            const btn = document.getElementById('post-btn');

            if(!name || !file) return alert("Nom va rasm kiriting!");

            btn.innerText = "YUKLANMOQDA...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    await addDoc(colRef, {
                        name: name,
                        bio: bio,
                        img: e.target.result,
                        createdAt: Date.now()
                    });
                    document.getElementById('modal').style.display = 'none';
                    btn.innerText = "POST QILISH";
                    btn.disabled = false;
                } catch (err) {
                    alert("Xato: " + err.message);
                    btn.disabled = false;
                    btn.innerText = "POST QILISH";
                }
            };
            reader.readAsDataURL(file);
        });

        onSnapshot(query(colRef, orderBy("createdAt", "desc")), (snap) => {
            const cont = document.getElementById('posts-container');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                cont.innerHTML += `
                    <div class="card">
                        <img src="${d.img}">
                        <h3>${d.name}</h3>
                        <p>${d.bio}</p>
                    </div>`;
            });
        });
    </script>
</body>
</html>
