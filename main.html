<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Plaza - Ultra Pro</title>
    <style>
        :root { --neon: #00ff00; --bg: #050505; --card: #0f0f0f; --glass: rgba(0, 255, 0, 0.05); }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 90px; background: #000; border-right: 1px solid var(--neon); display: flex; flex-direction: column; align-items: center; padding-top: 25px; gap: 30px; box-shadow: 5px 0 15px rgba(0,255,0,0.1); }
        .nav-item { cursor: pointer; transition: 0.3s; text-align: center; opacity: 0.6; }
        .nav-item:hover, .nav-item.active { opacity: 1; transform: scale(1.1); text-shadow: 0 0 10px var(--neon); }
        .nav-item span { font-size: 24px; display: block; }
        .nav-label { font-size: 10px; text-transform: uppercase; margin-top: 5px; }

        /* MAIN */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header { height: 70px; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; background: rgba(0,0,0,0.8); }
        .section { display: none; flex: 1; overflow-y: auto; padding: 30px; }
        .section.active { display: block; }

        /* USER INFO */
        .u-info { display: flex; align-items: center; gap: 15px; border-left: 1px solid #333; padding-left: 20px; }
        #u-img { width: 35px; border-radius: 50%; border: 1px solid var(--neon); }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 15px; transition: 0.3s; overflow: hidden; }
        .card:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,255,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-txt { padding: 15px; }

        /* CHAT BOX */
        .chat-container { height: 80vh; background: var(--card); border: 1px solid var(--neon); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: var(--glass); padding: 10px 15px; border-radius: 8px; border: 1px solid #222; max-width: 80%; }
        .msg b { color: #fff; font-size: 12px; display: block; margin-bottom: 3px; }
        .chat-bar { display: flex; border-top: 1px solid var(--neon); background: #000; }
        .chat-bar input { flex: 1; background: transparent; border: none; color: #fff; padding: 15px; outline: none; }

        /* MODAL */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .m-box { background: #000; border: 1px solid var(--neon); padding: 30px; width: 350px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,255,0,0.2); }
        .m-box input, .m-box textarea { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 10px; margin: 10px 0; border-radius: 5px; outline: none; }
        .m-box input:focus { border-color: var(--neon); }

        .btn-plus { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--neon); color: #000; border: none; border-radius: 50%; font-size: 35px; cursor: pointer; box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-item active" onclick="nav('brainrots')"><span>🏠</span><div class="nav-label">Wiki</div></div>
        <div class="nav-item" onclick="nav('chat')"><span>💬</span><div class="nav-label">Global</div></div>
        <div class="nav-item" onclick="nav('shop')"><span>🛒</span><div class="nav-label">Shop</div></div>
        <div class="nav-item" onclick="nav('admin')"><span>👑</span><div class="nav-label">Admin</div></div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 id="title" style="letter-spacing: 2px;">BRAINROTLAR</h2>
            <div class="u-info">
                <span id="u-name">...</span>
                <img id="u-img" src="">
                <button onclick="signOutUser()" style="background:none; border:none; color:red; cursor:pointer;">Logout</button>
            </div>
        </div>

        <div id="brainrots" class="section active">
            <input type="text" id="qidiruv" placeholder="Ism bo'yicha qidirish..." style="width:100%; padding:12px; background:var(--card); border:1px solid #333; color:#0f0; margin-bottom:20px; border-radius:8px;">
            <div id="p-grid" class="grid"></div>
        </div>

        <div id="chat" class="section">
            <div class="chat-container">
                <div id="g-msgs" class="msgs"></div>
                <div class="chat-bar">
                    <input type="text" id="g-in" placeholder="Hamma ko'radigan xabar...">
                    <button onclick="sendG()" style="padding: 0 20px; background:var(--neon); border:none; cursor:pointer;">></button>
                </div>
            </div>
        </div>

        <div id="shop" class="section">
            <h1 style="text-align: center; margin-top: 100px;">SOON...</h1>
        </div>

        <div id="admin" class="section">
            <div class="chat-container">
                <div id="a-msgs" class="msgs"></div>
                <div class="chat-bar">
                    <input type="text" id="a-in" placeholder="Adminga maxfiy xabar...">
                    <button onclick="sendA()" style="padding: 0 20px; background:var(--neon); border:none; cursor:pointer;">></button>
                </div>
            </div>
        </div>
    </div>

    <button class="btn-plus" onclick="openM()">+</button>

    <div id="modal" class="modal">
        <div class="m-box">
            <h3>Yangi Post</h3>
            <input type="text" id="post-name" placeholder="Nomi">
            <textarea id="post-desc" placeholder="Ma'lumot"></textarea>
            <input type="file" id="post-file" accept="image/*">
            <button onclick="savePost()" style="width:100%; padding:12px; background:var(--neon); border:none; font-weight:bold; cursor:pointer; margin-top:10px;">YUKLASH</button>
            <button onclick="closeM()" style="width:100%; background:none; border:none; color:red; margin-top:10px; cursor:pointer;">Yopish</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyAOfHOeEY_z5_UIZ3iX37-ghsn3GPCCcaw",
            authDomain: "roblox-trade-plaza.firebaseapp.com",
            projectId: "roblox-trade-plaza",
            storageBucket: "roblox-trade-plaza.firebasestorage.app",
            messagingSenderId: "357233560307",
            appId: "1:357233560307:web:f7b972214189aa04278586"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let user = null;

        // AUTH
        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('u-name').innerText = u.displayName;
                document.getElementById('u-img').src = u.photoURL;
                loadAdminChat();
            } else {
                signInWithPopup(auth, provider);
            }
        });
        window.signOutUser = () => signOut(auth);

        // NAVIGATION
        window.nav = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('title').innerText = id.toUpperCase();
        };

        // GLOBAL CHAT
        window.sendG = async () => {
            const val = document.getElementById('g-in').value;
            if(val && user) {
                await addDoc(collection(db, "global"), { name: user.displayName, email: user.email, text: val, time: serverTimestamp() });
                document.getElementById('g-in').value = "";
            }
        };
        onSnapshot(query(collection(db, "global"), orderBy("time", "asc")), (s) => {
            const b = document.getElementById('g-msgs');
            b.innerHTML = "";
            s.forEach(d => b.innerHTML += `<div class="msg"><b>${d.data().name}</b>${d.data().text}</div>`);
            b.scrollTop = b.scrollHeight;
        });

        // ADMIN CHAT (Private)
        window.sendA = async () => {
            const val = document.getElementById('a-in').value;
            if(val && user) {
                // Foydalanuvchining o'z xonasi (email asosida)
                await addDoc(collection(db, "chats", user.email, "messages"), { name: user.displayName, text: val, time: serverTimestamp() });
                document.getElementById('a-in').value = "";
            }
        };
        function loadAdminChat() {
            onSnapshot(query(collection(db, "chats", user.email, "messages"), orderBy("time", "asc")), (s) => {
                const b = document.getElementById('a-msgs');
                b.innerHTML = "";
                s.forEach(d => b.innerHTML += `<div class="msg"><b>${d.data().name}</b>${d.data().text}</div>`);
                b.scrollTop = b.scrollHeight;
            });
        }

        // POSTS
        window.openM = () => document.getElementById('modal').style.display='flex';
        window.closeM = () => document.getElementById('modal').style.display='none';
        window.savePost = async () => {
            const name = document.getElementById('post-name').value;
            const desc = document.getElementById('post-desc').value;
            const file = document.getElementById('post-file').files[0];
            if(!name || !file) return alert("To'ldiring!");

            const reader = new FileReader();
            reader.onload = async (e) => {
                await addDoc(collection(db, "posts"), { name, desc, img: e.target.result, time: serverTimestamp() });
                closeM();
            };
            reader.readAsDataURL(file);
        };

        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (s) => {
            const g = document.getElementById('p-grid');
            g.innerHTML = "";
            s.forEach(d => {
                g.innerHTML += `<div class="card"><img src="${d.data().img}"><div class="card-txt"><h4>${d.data().name}</h4><p>${d.data().desc}</p></div></div>`;
            });
        });
    </script>
</body>
</html>
