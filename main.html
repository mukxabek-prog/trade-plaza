<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Sigma Plaza - Final Fix</title>
    <style>
        :root { --neon: #0f0; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 80px; border-right: 2px solid var(--neon); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 25px; }
        .nav-btn { cursor: pointer; text-align: center; font-size: 10px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 15px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .section { display: none; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { border: 1px solid var(--neon); background: #0a0a0a; padding: 5px; position: relative; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; cursor: pointer; padding: 2px 8px; }
        .chat-box { height: 350px; border: 1px solid var(--neon); overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #050505; color: #fff; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; width: 70%; }
        button { background: var(--neon); border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-btn" onclick="show('wiki')">🏠<br>WIKI</div>
        <div class="nav-btn" onclick="show('global')">💬<br>CHAT</div>
        <div class="nav-btn" onclick="show('admin')">👑<br>ADMIN</div>
    </div>

    <div class="main">
        <div class="header">
            <span style="font-size: 20px; font-weight: bold;">SIGMA PLAZA</span>
            <div id="u-display" style="font-size: 12px; border: 1px solid var(--neon); padding: 5px;">Kirilmagan</div>
        </div>

        <div class="content">
            <div id="wiki" class="section active"><div id="wiki-list" class="grid"></div></div>
            <div id="global" class="section">
                <div id="g-msgs" class="chat-box"></div>
                <input type="text" id="g-input" placeholder="Hamma ko'radigan xabar...">
                <button onclick="sendG()">YUBORISH</button>
            </div>
            <div id="admin" class="section">
                <div id="a-msgs" class="chat-box"></div>
                <input type="text" id="a-input" placeholder="Adminga xabar...">
                <button onclick="sendA()">YUBORISH</button>
            </div>
        </div>
    </div>

    <button style="position:fixed; bottom:30px; right:30px; width:60px; height:60px; border-radius:50%; background:var(--neon); border:none; font-size:30px; cursor:pointer;" onclick="document.getElementById('modal').style.display='flex'">+</button>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:1000;">
        <div style="background:#000; border:2px solid var(--neon); padding:30px; border-radius:15px; width:300px;">
            <h3 style="margin-top:0;">Yangi Post</h3>
            <input type="text" id="p-name" placeholder="Nomi" style="width:100%; margin-bottom:10px;"><br>
            <input type="file" id="p-file" style="width:100%; margin-bottom:20px;"><br>
            <button onclick="saveP()" style="width:100%;">POST QILISH</button><br>
            <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; background:none; color:red; margin-top:10px;">Yopish</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyAOfHOeEY_z5_UIZ3iX37-ghsn3GPCCcaw",
            authDomain: "roblox-trade-plaza.firebaseapp.com",
            projectId: "roblox-trade-plaza",
            storageBucket: "roblox-trade-plaza.firebasestorage.app",
            messagingSenderId: "357233560307",
            appId: "1:357233560307:web:f7b972214189aa04278586"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let user = null;

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('u-display').innerText = u.displayName;
                listenAdmin();
            } else {
                signInWithPopup(auth, provider);
            }
        });

        window.show = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.saveP = async () => {
            const name = document.getElementById('p-name').value;
            const file = document.getElementById('p-file').files[0];
            if(!name || !file) return alert("To'ldiring!");

            const reader = new FileReader();
            reader.onload = async (e) => {
                await addDoc(collection(db, "all_posts"), { name, img: e.target.result, owner: user.email });
                document.getElementById('modal').style.display='none';
            };
            reader.readAsDataURL(file);
        };

        onSnapshot(collection(db, "all_posts"), (s) => {
            const list = document.getElementById('wiki-list');
            list.innerHTML = "";
            s.forEach(d => {
                const p = d.data();
                list.innerHTML += `<div class="card">
                    ${(user && p.owner === user.email) ? `<button class="del-btn" onclick="del('${d.id}')">X</button>` : ''}
                    <img src="${p.img}"><div style="padding:10px; text-align:center;">${p.name}</div>
                </div>`;
            });
        });

        window.del = async (id) => { if(confirm("O'chirasizmi?")) await deleteDoc(doc(db, "all_posts", id)); };

        window.sendG = async () => {
            const val = document.getElementById('g-input').value;
            if(val && user) {
                await addDoc(collection(db, "global_chat"), { name: user.displayName, text: val });
                document.getElementById('g-input').value = "";
            }
        };

        onSnapshot(collection(db, "global_chat"), (s) => {
            const box = document.getElementById('g-msgs'); box.innerHTML = "";
            s.forEach(d => box.innerHTML += `<div><b style="color:#0f0">${d.data().name}:</b> ${d.data().text}</div>`);
            box.scrollTop = box.scrollHeight;
        });

        window.sendA = async () => {
            const val = document.getElementById('a-input').value;
            if(val && user) {
                await addDoc(collection(db, "admin_messages", user.email, "msgs"), { name: user.displayName, text: val });
                document.getElementById('a-input').value = "";
            }
        };

        function listenAdmin() {
            onSnapshot(collection(db, "admin_messages", user.email, "msgs"), (s) => {
                const box = document.getElementById('a-msgs'); box.innerHTML = "";
                s.forEach(d => box.innerHTML += `<div><b style="color:#0f0">${d.data().name}:</b> ${d.data().text}</div>`);
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
