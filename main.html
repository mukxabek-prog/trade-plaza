<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Plaza - Final Fix</title>
    <style>
        :root { --neon: #00ff00; --bg: #000; --card: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 80px; background: #050505; border-right: 1px solid var(--neon); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; }
        .nav-item { cursor: pointer; text-align: center; opacity: 0.6; transition: 0.3s; font-size: 10px; color: var(--neon); }
        .nav-item.active { opacity: 1; text-shadow: 0 0 10px var(--neon); font-weight: bold; }
        .nav-item span { font-size: 24px; display: block; margin-bottom: 5px; }
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { height: 60px; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: #000; }
        .section { display: none; flex: 1; overflow-y: auto; padding: 15px; }
        .section.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 10px; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .card-body { padding: 8px; text-align: center; font-size: 12px; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 4px; padding: 2px 6px; cursor: pointer; z-index: 5; }
        .msgs-box { flex: 1; overflow-y: auto; padding: 10px; color: #fff; font-size: 13px; }
        .chat-in { display: flex; border-top: 1px solid var(--neon); background: #000; }
        .chat-in input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; outline: none; }
        .chat-in button { background: var(--neon); border: none; padding: 0 15px; cursor: pointer; font-weight: bold; }
        .chat-overlay { position: fixed; bottom: 10px; right: 10px; width: 280px; height: 380px; background: #000; border: 2px solid var(--neon); border-radius: 8px; display: none; flex-direction: column; z-index: 5000; }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:6000; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-item active" onclick="nav('wiki', this)"><span>🏠</span>Asosiy</div>
        <div class="nav-item" onclick="nav('global', this)"><span>💬</span>Global</div>
        <div class="nav-item" onclick="nav('friends', this)"><span>👥</span>Friends</div>
        <div class="nav-item" onclick="nav('admin', this)"><span>👑</span>Admin</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 style="margin:0; font-size:16px;">SIGMA PLAZA</h2>
            <div id="user-area" style="display:flex; align-items:center; gap:8px;">
                <span id="user-name" style="font-size:11px; color:#fff;">Kirish...</span>
                <img id="user-img" src="" style="width:28px; height:28px; border-radius:50%; border:1px solid var(--neon); display:none;">
            </div>
        </div>

        <div id="wiki" class="section active">
            <div style="display:flex; gap:8px; margin-bottom:15px;">
                <input type="text" id="wiki-search" placeholder="Qidiruv..." style="flex:1; background:#111; border:1px solid #333; color:#fff; padding:10px; border-radius:5px;" oninput="filterWiki()">
                <button onclick="checkAuthAndOpenModal()" style="background:var(--neon); color:#000; border:none; padding:0 15px; border-radius:5px; font-weight:bold; cursor:pointer;">+ POST</button>
            </div>
            <div id="wiki-grid" class="grid"></div>
        </div>

        <div id="friends" class="section"><div id="friends-grid" class="grid"></div></div>
        <div id="global" class="section">
            <div style="height:90%; display:flex; flex-direction:column; border:1px solid var(--neon); border-radius:8px;">
                <div id="g-msgs" class="msgs-box"></div>
                <div class="chat-in"><input type="text" id="g-input" placeholder="Xabar..."><button onclick="sendGlobal()">></button></div>
            </div>
        </div>
        <div id="admin" class="section">
            <div style="display: flex; height: 90%; gap: 10px;">
                <div id="admin-user-list" style="width: 150px; border: 1px solid var(--neon); border-radius: 8px; overflow-y: auto; padding: 8px; background: #050505;"><div id="user-tabs"></div></div>
                <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid var(--neon); border-radius: 8px;">
                    <div id="a-msgs" class="msgs-box"></div>
                    <div class="chat-in"><input type="text" id="a-input" placeholder="Adminga yozish..."><button onclick="sendAdminMsg()">></button></div>
                </div>
            </div>
        </div>
    </div>

    <div id="p-chat" class="chat-overlay">
        <div style="background:#111; padding:8px; display:flex; justify-content:space-between; border-bottom:1px solid var(--neon); font-size:12px;"><span id="p-chat-name">Chat</span><span onclick="document.getElementById('p-chat').style.display='none'" style="cursor:pointer; color:red;">[X]</span></div>
        <div id="p-msgs" class="msgs-box"></div>
        <div class="chat-in"><input type="text" id="p-input" placeholder="Xabar..."><button onclick="sendPriv()">></button></div>
    </div>

    <div id="modal">
        <div style="background:#000; border:2px solid var(--neon); padding:20px; width:280px; border-radius:12px;">
            <h3 style="margin-top:0;">Yangi Post</h3>
            <input type="text" id="p-name" placeholder="Nomi" style="width:100%; margin-bottom:10px; background:#111; color:#fff; border:1px solid #333; padding:10px; box-sizing:border-box;">
            <input type="file" id="p-file" style="width:100%; margin-bottom:15px; color:#fff;">
            <button onclick="savePost()" id="save-btn" style="width:100%; background:var(--neon); border:none; padding:12px; font-weight:bold; cursor:pointer;">YUKLASH</button>
            <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; background:none; border:none; color:red; margin-top:10px; cursor:pointer;">Bekor qilish</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, setDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyAOfHOeEY_z5_UIZ3iX37-ghsn3GPCCcaw",
            authDomain: "roblox-trade-plaza.firebaseapp.com",
            projectId: "roblox-trade-plaza",
            storageBucket: "roblox-trade-plaza.firebasestorage.app",
            messagingSenderId: "357233560307",
            appId: "1:357233560307:web:f7b972214189aa04278586"
        };

        const ADMIN_EMAIL = "mukxabek@gmail.com"; 
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let user = null; let activePrivChat = null; let selectedAdminChatUser = null; let allUsers = [];

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                document.getElementById('user-name').innerText = u.displayName;
                const img = document.getElementById('user-img'); img.src = u.photoURL; img.style.display = 'block';
                await setDoc(doc(db, "users", u.email), { name: u.displayName, img: u.photoURL, email: u.email });
                loadFriends(); listenAdmin();
            } else {
                document.getElementById('user-name').innerHTML = `<button onclick="startLogin()" style="background:var(--neon); border:none; padding:5px 10px; cursor:pointer; font-weight:bold; border-radius:4px; font-size:12px;">KIRISH</button>`;
            }
        });

        window.startLogin = () => signInWithRedirect(auth, provider);
        getRedirectResult(auth).catch(e => console.error(e));

        window.nav = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        };

        let wikiPosts = [];
        onSnapshot(query(collection(db, "all_posts"), orderBy("time", "desc")), (s) => {
            wikiPosts = []; s.forEach(d => wikiPosts.push({id: d.id, ...d.data()}));
            renderWiki(wikiPosts);
        });

        function renderWiki(data) {
            const grid = document.getElementById('wiki-grid'); grid.innerHTML = "";
            data.forEach(p => {
                const card = document.createElement('div'); card.className = 'card';
                const nick = p.owner ? p.owner.split('@')[0] : "Anon";
                card.innerHTML = `${(user && p.owner === user.email) ? `<button class="del-btn" onclick="event.stopPropagation(); deletePost('${p.id}')">X</button>` : ''}<img src="${p.img}"><div class="card-body"><b>${p.name}</b><br><span onclick="openChatFromPost('${p.owner}')" style="color:var(--neon); font-size:10px; cursor:pointer; text-decoration:underline;">Ega: ${nick}</span></div>`;
                grid.appendChild(card);
            });
        }

        window.openChatFromPost = (email) => { if(!user) return; if(user.email === email) return; const target = allUsers.find(u => u.email === email) || {email: email, name: email.split('@')[0]}; openPriv(target); };

        function loadFriends() {
            onSnapshot(collection(db, "users"), (s) => {
                allUsers = []; const grid = document.getElementById('friends-grid'); grid.innerHTML = "";
                s.forEach(d => {
                    const u = d.data(); if(user && u.email !== user.email) {
                        allUsers.push(u);
                        const div = document.createElement('div'); div.className = 'card'; div.onclick = () => openPriv(u);
                        div.innerHTML = `<img src="${u.img}"><div class="card-body"><b>${u.name}</b></div>`;
                        grid.appendChild(div);
                    }
                });
            });
        }

        let privUnsub = null;
        window.openPriv = (target) => {
            activePrivChat = target; document.getElementById('p-chat-name').innerText = target.name;
            document.getElementById('p-chat').style.display = 'flex'; if(privUnsub) privUnsub();
            const chatId = [user.email, target.email].sort().join("_");
            privUnsub = onSnapshot(query(collection(db, "messages", chatId, "list"), orderBy("time", "asc")), (s) => {
                const b = document.getElementById('p-msgs'); b.innerHTML = "";
                s.forEach(d => { const m = d.data(); b.innerHTML += `<div><b style="color:${m.sender===user.email?'var(--neon)':'#fff'}">${m.name}:</b> ${m.text}</div>`; });
                b.scrollTop = b.scrollHeight;
            });
        };

        window.sendPriv = async () => {
            const t = document.getElementById('p-input').value; if(!t) return;
            const chatId = [user.email, activePrivChat.email].sort().join("_");
            await addDoc(collection(db, "messages", chatId, "list"), { sender: user.email, name: user.displayName, text: t, time: serverTimestamp() });
            document.getElementById('p-input').value = "";
        };

        window.sendAdminMsg = async () => {
            const t = document.getElementById('a-input').value; if(!t) return;
            const path = (user.email === ADMIN_EMAIL) ? selectedAdminChatUser : user.email; if(!path) return;
            await addDoc(collection(db, "admin_messages", path, "list"), { sender: user.email, name: user.displayName, text: t, time: serverTimestamp() });
            if(user.email !== ADMIN_EMAIL) await setDoc(doc(db, "admin_messages", user.email), { last: serverTimestamp() }, { merge: true });
            document.getElementById('a-input').value = "";
        };

        let adminSub = null;
        function listenAdmin() {
            if(user.email === ADMIN_EMAIL) {
                onSnapshot(collection(db, "admin_messages"), (s) => {
                    const list = document.getElementById('user-tabs'); list.innerHTML = "";
                    s.forEach(d => {
                        const div = document.createElement('div'); div.style = "padding:8px; background:#111; margin-bottom:5px; border-radius:4px; cursor:pointer; font-size:11px;";
                        div.innerText = d.id.split('@')[0]; div.onclick = () => { selectedAdminChatUser = d.id; loadAdminChat(d.id); };
                        list.appendChild(div);
                    });
                });
            } else { document.getElementById('admin-user-list').style.display = 'none'; loadAdminChat(user.email); }
        }

        function loadAdminChat(path) {
            if(adminSub) adminSub();
            adminSub = onSnapshot(query(collection(db, "admin_messages", path, "list"), orderBy("time", "asc")), (s) => {
                const b = document.getElementById('a-msgs'); b.innerHTML = "";
                s.forEach(d => { const m = d.data(); b.innerHTML += `<div><b style="color:${m.sender===ADMIN_EMAIL?'red':'var(--neon)'}">${m.name}:</b> ${m.text}</div>`; });
                b.scrollTop = b.scrollHeight;
            });
        }

        window.sendGlobal = async () => {
            const t = document.getElementById('g-input').value; if(!t || !user) return;
            await addDoc(collection(db, "global_chat"), { name: user.displayName, text: t, time: serverTimestamp() });
            document.getElementById('g-input').value = "";
        };
        onSnapshot(query(collection(db, "global_chat"), orderBy("time", "asc")), (s) => {
            const b = document.getElementById('g-msgs'); b.innerHTML = "";
            s.forEach(d => b.innerHTML += `<div><b style="color:var(--neon)">${d.data().name}:</b> ${d.data().text}</div>`);
            b.scrollTop = b.scrollHeight;
        });

        window.checkAuthAndOpenModal = () => { if(!user) return alert("Kiring!"); document.getElementById('modal').style.display='flex'; };
        window.filterWiki = () => { const q = document.getElementById('wiki-search').value.toLowerCase(); renderWiki(wikiPosts.filter(p => p.name.toLowerCase().includes(q))); };
        window.savePost = async () => {
            const n = document.getElementById('p-name').value; const f = document.getElementById('p-file').files[0]; if(!n || !f) return;
            const r = new FileReader(); r.onload = async (e) => {
                await addDoc(collection(db, "all_posts"), { name: n, img: e.target.result, owner: user.email, time: serverTimestamp() });
                document.getElementById('modal').style.display = 'none';
            }; r.readAsDataURL(f);
        };
        window.deletePost = async (id) => { if(confirm("O'chirish?")) await deleteDoc(doc(db, "all_posts", id)); };
    </script>
</body>
</html>
