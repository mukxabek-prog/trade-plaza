<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Plaza - Fixed Edition</title>
    <style>
        :root { --neon: #00ff00; --bg: #050505; --card: #0f0f0f; --glass: rgba(0, 255, 0, 0.05); }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 90px; background: #000; border-right: 1px solid var(--neon); display: flex; flex-direction: column; align-items: center; padding-top: 25px; gap: 30px; }
        .nav-item { cursor: pointer; text-align: center; opacity: 0.6; transition: 0.3s; }
        .nav-item.active { opacity: 1; text-shadow: 0 0 10px var(--neon); }
        .nav-label { font-size: 10px; text-transform: uppercase; margin-top: 5px; }

        /* CONTENT */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .header { height: 70px; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; }
        .section { display: none; flex: 1; overflow-y: auto; padding: 30px; }
        .section.active { display: block; }

        /* CARDS & DELETE BUTTON */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 15px; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-txt { padding: 15px; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.7); color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 12px; z-index: 10; }

        /* CHAT */
        .chat-container { height: 75vh; background: var(--card); border: 1px solid var(--neon); border-radius: 10px; display: flex; flex-direction: column; }
        .msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; color: #fff; }
        .chat-bar { display: flex; border-top: 1px solid var(--neon); }
        .chat-bar input { flex: 1; background: transparent; border: none; color: #fff; padding: 15px; outline: none; }
        .chat-bar button { background: var(--neon); border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
        
        #u-img { width: 35px; border-radius: 50%; border: 1px solid var(--neon); }
        .btn-plus { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--neon); border: none; border-radius: 50%; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-item active" onclick="nav('brainrots', this)"><span>🏠</span><div class="nav-label">Wiki</div></div>
        <div class="nav-item" onclick="nav('chat', this)"><span>💬</span><div class="nav-label">Global</div></div>
        <div class="nav-item" onclick="nav('admin', this)"><span>👑</span><div class="nav-label">Admin</div></div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 id="title">BRAINROTLAR</h2>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="u-name">...</span>
                <img id="u-img" src="">
            </div>
        </div>

        <div id="brainrots" class="section active">
            <div id="p-grid" class="grid"></div>
        </div>

        <div id="chat" class="section">
            <div class="chat-container">
                <div id="g-msgs" class="msgs"></div>
                <div class="chat-bar">
                    <input type="text" id="g-in" placeholder="Global xabar...">
                    <button onclick="sendG()">YUBORISH</button>
                </div>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="chat-container">
                <div id="a-msgs" class="msgs"></div>
                <div class="chat-bar">
                    <input type="text" id="a-in" placeholder="Adminga xabar...">
                    <button onclick="sendA()">YUBORISH</button>
                </div>
            </div>
        </div>
    </div>

    <button class="btn-plus" onclick="document.getElementById('modal').style.display='flex'">+</button>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#000; border:1px solid var(--neon); padding:20px; width:300px; border-radius:10px;">
            <input type="text" id="post-name" placeholder="Nomi" style="width:100%; margin-bottom:10px;">
            <input type="file" id="post-file" style="width:100%; margin-bottom:10px;">
            <button onclick="savePost()" style="width:100%; background:var(--neon); padding:10px;">YUKLASH</button>
            <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; margin-top:10px; background:red;">YOPISH</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyAOfHOeEY_z5_UIZ3iX37-ghsn3GPCCcaw",
            authDomain: "roblox-trade-plaza.firebaseapp.com",
            projectId: "roblox-trade-plaza",
            storageBucket: "roblox-trade-plaza.firebasestorage.app",
            messagingSenderId: "357233560307",
            appId: "1:357233560307:web:f7b972214189aa04278586"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let user = null;

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('u-name').innerText = u.displayName;
                document.getElementById('u-img').src = u.photoURL;
                loadAdminChat();
            } else {
                signInWithPopup(auth, provider);
            }
        });

        window.nav = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        // GLOBAL CHAT FUNKSIYASI
        window.sendG = async () => {
            const val = document.getElementById('g-in').value;
            if(val && user) {
                await addDoc(collection(db, "global"), { name: user.displayName, text: val, time: serverTimestamp() });
                document.getElementById('g-in').value = "";
            }
        };

        onSnapshot(query(collection(db, "global"), orderBy("time", "asc")), (s) => {
            const b = document.getElementById('g-msgs');
            b.innerHTML = "";
            s.forEach(d => b.innerHTML += `<div><b>${d.data().name}:</b> ${d.data().text}</div>`);
            b.scrollTop = b.scrollHeight;
        });

        // ADMIN CHAT FUNKSIYASI
        window.sendA = async () => {
            const val = document.getElementById('a-in').value;
            if(val && user) {
                await addDoc(collection(db, "chats", user.email, "messages"), { name: user.displayName, text: val, time: serverTimestamp() });
                document.getElementById('a-in').value = "";
            }
        };

        function loadAdminChat() {
            onSnapshot(query(collection(db, "chats", user.email, "messages"), orderBy("time", "asc")), (s) => {
                const b = document.getElementById('a-msgs');
                b.innerHTML = "";
                s.forEach(d => b.innerHTML += `<div><b>${d.data().name}:</b> ${d.data().text}</div>`);
                b.scrollTop = b.scrollHeight;
            });
        }

        // POST YUKLASH
        window.savePost = async () => {
            const name = document.getElementById('post-name').value;
            const file = document.getElementById('post-file').files[0];
            if(!name || !file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                await addDoc(collection(db, "posts"), { name, img: e.target.result, email: user.email, time: serverTimestamp() });
                document.getElementById('modal').style.display='none';
            };
            reader.readAsDataURL(file);
        };

        // POSTLARNI CHIQARISH VA O'CHIRISH
        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (s) => {
            const g = document.getElementById('p-grid');
            g.innerHTML = "";
            s.forEach(d => {
                const data = d.data();
                // O'chirish tugmasi faqat post egasiga ko'rinadi
                const delBtn = (user && data.email === user.email) ? `<button class="del-btn" onclick="deleteP('${d.id}')">O'chirish</button>` : "";
                
                g.innerHTML += `
                    <div class="card">
                        ${delBtn}
                        <img src="${data.img}">
                        <div class="card-txt"><h4>${data.name}</h4></div>
                    </div>`;
            });
        });

        window.deleteP = async (id) => {
            if(confirm("Postni o'chirasizmi?")) {
                await deleteDoc(doc(db, "posts", id));
            }
        };
    </script>
</body>
</html>
