<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sigma Plaza - Final Fix</title>
    <style>
        :root { --neon: #0f0; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 80px; border-right: 2px solid var(--neon); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 30px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 15px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; }
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .section { display: none; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { border: 1px solid var(--neon); padding: 5px; background: #0a0a0a; position: relative; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .chat-box { height: 70vh; border: 1px solid var(--neon); overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #050505; color: #fff; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; flex: 1; }
        button { background: var(--neon); border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div onclick="show('wiki')" style="cursor:pointer">🏠<br>Wiki</div>
        <div onclick="show('global')" style="cursor:pointer">💬<br>Chat</div>
        <div onclick="show('admin')" style="cursor:pointer">👑<br>Admin</div>
    </div>

    <div class="main">
        <div class="header">
            <b>SIGMA PLAZA</b>
            <div id="u-name">Kirish kutilmoqda...</div>
        </div>

        <div class="content">
            <div id="wiki" class="section active"><div id="wiki-list" class="grid"></div></div>
            
            <div id="global" class="section">
                <div id="g-msgs" class="chat-box"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="g-in" placeholder="Xabar...">
                    <button onclick="sendG()">></button>
                </div>
            </div>

            <div id="admin" class="section">
                <div id="a-msgs" class="chat-box"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="a-in" placeholder="Adminga...">
                    <button onclick="sendA()">></button>
                </div>
            </div>
        </div>
    </div>

    <button style="position:fixed; bottom:20px; right:20px; width:50px; height:50px; border-radius:50%; background:var(--neon); cursor:pointer;" onclick="document.getElementById('modal').style.display='flex'">+</button>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000;">
        <div style="background:#000; border:1px solid var(--neon); padding:20px; width:280px;">
            <input type="text" id="p-name" placeholder="Nomi" style="width:90%"><br><br>
            <input type="file" id="p-file" style="width:90%"><br><br>
            <button onclick="saveP()">YUKLASH</button>
            <button onclick="document.getElementById('modal').style.display='none'" style="background:red">X</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const conf = {
            apiKey: "AIzaSyAOfHOeEY_z5_UIZ3iX37-ghsn3GPCCcaw",
            authDomain: "roblox-trade-plaza.firebaseapp.com",
            projectId: "roblox-trade-plaza",
            storageBucket: "roblox-trade-plaza.firebasestorage.app",
            messagingSenderId: "357233560307",
            appId: "1:357233560307:web:f7b972214189aa04278586"
        };

        const app = initializeApp(conf);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const prov = new GoogleAuthProvider();
        let user = null;

        onAuthStateChanged(auth, (u) => {
            if(u) { 
                user = u; 
                document.getElementById('u-name').innerText = u.displayName;
                loadAdmin(); 
            } else { signInWithPopup(auth, prov); }
        });

        window.show = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // GLOBAL CHAT (Bazadagi global_chat bilan moslandi)
        window.sendG = async () => {
            const val = document.getElementById('g-in').value;
            if(val && user) {
                await addDoc(collection(db, "global_chat"), { name: user.displayName, text: val, time: serverTimestamp() });
                document.getElementById('g-in').value = "";
            }
        };

        onSnapshot(query(collection(db, "global_chat"), orderBy("time", "asc")), (snap) => {
            const box = document.getElementById('g-msgs');
            box.innerHTML = "";
            snap.forEach(d => {
                box.innerHTML += `<div><b>${d.data().name || 'Anonim'}:</b> ${d.data().text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // POSTS (Bazadagi posts bilan moslandi)
        window.saveP = async () => {
            const name = document.getElementById('p-name').value;
            const file = document.getElementById('p-file').files[0];
            if(!name || !file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                await addDoc(collection(db, "posts"), { name, img: e.target.result, owner: user.email, time: serverTimestamp() });
                document.getElementById('modal').style.display = 'none';
            };
            reader.readAsDataURL(file);
        };

        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
            const list = document.getElementById('wiki-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `<div class="card">
                    ${(user && p.owner === user.email) ? `<button onclick="del('${d.id}')" style="position:absolute;right:5px;background:red;color:#fff;border:none;cursor:pointer">X</button>` : ''}
                    <img src="${p.img}"><div style="padding:5px;text-align:center">${p.name}</div>
                </div>`;
            });
        });

        window.del = async (id) => { if(confirm("O'chirilsinmi?")) await deleteDoc(doc(db, "posts", id)); };

        // ADMIN CHAT
        window.sendA = async () => {
            const val = document.getElementById('a-in').value;
            if(val && user) {
                await addDoc(collection(db, "admin_messages", user.email, "msgs"), { name: user.displayName, text: val, time: serverTimestamp() });
                document.getElementById('a-in').value = "";
            }
        };

        function loadAdmin() {
            onSnapshot(query(collection(db, "admin_messages", user.email, "msgs"), orderBy("time", "asc")), (snap) => {
                const box = document.getElementById('a-msgs');
                box.innerHTML = "";
                snap.forEach(d => box.innerHTML += `<div><b>${d.data().name}:</b> ${d.data().text}</div>`);
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
