<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Plaza - Professional Edition</title>
    <style>
        :root { --neon: #0f0; --dark: #050505; --sidebar-w: 80px; }
        body { margin: 0; background: #000; color: var(--neon); font-family: 'Courier New', monospace; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR (Rasmga o'xshash) */
        .sidebar { width: var(--sidebar-w); background: var(--dark); border-right: 2px solid var(--neon); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 25px; z-index: 100; }
        .nav-item { cursor: pointer; text-align: center; font-size: 10px; transition: 0.3s; width: 100%; padding: 10px 0; }
        .nav-item:hover { background: rgba(0, 255, 0, 0.1); }
        .nav-item img { width: 35px; filter: invert(1); margin-bottom: 5px; }

        /* MAIN CONTENT AREA */
        .content-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { padding: 10px 25px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; background: var(--dark); }
        .section { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .section.active { display: block; }

        /* GOOGLE USER INFO */
        #user-info { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        #user-img { width: 30px; border-radius: 50%; border: 1px solid var(--neon); }

        /* POST CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--dark); border: 1px solid #333; border-radius: 12px; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-body { padding: 12px; }

        /* CHAT STYLES */
        .chat-box { display: flex; flex-direction: column; height: 80%; border: 1px solid var(--neon); background: var(--dark); }
        #chat-msgs, #admin-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 13px; }
        .chat-input { display: flex; border-top: 1px solid var(--neon); }
        .chat-input input { flex: 1; background: #000; border: none; color: var(--neon); padding: 12px; outline: none; }

        /* BUTTONS */
        .add-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--neon); border: none; border-radius: 50%; font-size: 35px; cursor: pointer; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-item" onclick="showSection('brainrots')">🏠<br>Brainrot</div>
        <div class="nav-item" onclick="showSection('chat')">💬<br>Global</div>
        <div class="nav-item" onclick="showSection('shop')">🛒<br>Shop</div>
        <div class="nav-item" onclick="showSection('admin')">👑<br>Admin</div>
    </div>

    <div class="content-area">
        <div class="header">
            <h2 id="section-title">BRAINROTLAR QIDIRISH</h2>
            <div id="user-info">
                <span id="user-name">Yuklanmoqda...</span>
                <img id="user-img" src="" alt="">
                <button onclick="logout()" style="background:red; color:#fff; border:none; padding:5px; cursor:pointer;">X</button>
            </div>
        </div>

        <div id="brainrots" class="section active">
            <input type="text" id="search" placeholder="Brainrot qidirish..." style="width:100%; background:#111; border:1px solid var(--neon); color:#0f0; padding:10px; margin-bottom:20px;">
            <div id="posts-grid" class="grid"></div>
        </div>

        <div id="chat" class="section">
            <div class="chat-box">
                <div id="chat-msgs"></div>
                <div class="chat-input">
                    <input type="text" id="g-input" placeholder="Xabar yozing...">
                    <button onclick="sendGlobal()" style="background:var(--neon); border:none; width:50px;">></button>
                </div>
            </div>
        </div>

        <div id="shop" class="section">
            <h2 style="text-align:center;">TEZ KUNDA...</h2>
            <p style="text-align:center; color:#888;">Shop tizimi ishlab chiqilmoqda.</p>
        </div>

        <div id="admin" class="section">
            <div class="chat-box">
                <div id="admin-msgs"></div>
                <div class="chat-input">
                    <input type="text" id="a-input" placeholder="Adminga yozing (Trade yordami)...">
                    <button onclick="sendAdmin()" style="background:var(--neon); border:none; width:50px;">></button>
                </div>
            </div>
        </div>
    </div>

    <button class="add-btn" id="openModal">+</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOfHOeEY_z5_UIZ3iX37-ghsn3GPCCcaw",
            authDomain: "roblox-trade-plaza.firebaseapp.com",
            projectId: "roblox-trade-plaza",
            storageBucket: "roblox-trade-plaza.firebasestorage.app",
            messagingSenderId: "357233560307",
            appId: "1:357233560307:web:f7b972214189aa04278586"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // --- LOGIN TIZIMI ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-img').src = user.photoURL;
            } else {
                signInWithPopup(auth, provider);
            }
        });

        window.logout = () => signOut(auth);

        // --- NAVIGATION ---
        window.showSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('section-title').innerText = id.toUpperCase();
        };

        // --- GLOBAL CHAT ---
        window.sendGlobal = async () => {
            const txt = document.getElementById('g-input').value;
            if(txt && currentUser) {
                await addDoc(collection(db, "global_msgs"), {
                    user: currentUser.displayName,
                    text: txt,
                    time: serverTimestamp()
                });
                document.getElementById('g-input').value = "";
            }
        };

        onSnapshot(query(collection(db, "global_msgs"), orderBy("time", "asc")), (snap) => {
            const box = document.getElementById('chat-msgs');
            box.innerHTML = "";
            snap.forEach(d => box.innerHTML += `<div><b>${d.data().user}:</b> ${d.data().text}</div>`);
            box.scrollTop = box.scrollHeight;
        });

        // --- ADMIN CHAT ---
        window.sendAdmin = async () => {
            const txt = document.getElementById('a-input').value;
            if(txt && currentUser) {
                await addDoc(collection(db, "admin_help"), {
                    user: currentUser.displayName,
                    text: txt,
                    time: serverTimestamp()
                });
                document.getElementById('a-input').value = "";
            }
        };

        onSnapshot(query(collection(db, "admin_help"), orderBy("time", "asc")), (snap) => {
            const box = document.getElementById('admin-msgs');
            box.innerHTML = "";
            snap.forEach(d => box.innerHTML += `<div><b>${d.data().user}:</b> ${d.data().text}</div>`);
            box.scrollTop = box.scrollHeight;
        });

        // --- POSTLARNI CHIQARISH ---
        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
            const grid = document.getElementById('posts-grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.img}">
                        <div class="card-body">
                            <h4>${p.name}</h4>
                            <p>${p.desc || ''}</p>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
