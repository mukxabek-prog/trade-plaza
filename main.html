<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Sigma Plaza - Ishlaydigan Variant</title>
    <style>
        :root { --neon: #0f0; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: monospace; margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 80px; border-right: 1px solid var(--neon); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; }
        .nav-btn { cursor: pointer; font-size: 12px; text-align: center; }

        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 10px; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; }
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .section { display: none; }
        .active { display: block; }

        /* Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { border: 1px solid #333; padding: 5px; position: relative; background: #0a0a0a; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; cursor: pointer; }

        /* Chat */
        .chat-box { height: 300px; border: 1px solid var(--neon); overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-btn" onclick="show('wiki')">🏠<br>Wiki</div>
        <div class="nav-btn" onclick="show('global')">💬<br>Global</div>
        <div class="nav-btn" onclick="show('admin')">👑<br>Admin</div>
    </div>

    <div class="main">
        <div class="header">
            <span>SIGMA PLAZA</span>
            <div id="user-display">...</div>
        </div>

        <div class="content">
            <div id="wiki" class="section active">
                <div id="wiki-list" class="grid"></div>
            </div>

            <div id="global" class="section">
                <div id="g-msgs" class="chat-box"></div>
                <input type="text" id="g-input" placeholder="Xabar...">
                <button onclick="sendG()">Yuborish</button>
            </div>

            <div id="admin" class="section">
                <div id="a-msgs" class="chat-box"></div>
                <input type="text" id="a-input" placeholder="Adminga xabar...">
                <button onclick="sendA()">Yuborish</button>
            </div>
        </div>
    </div>

    <button style="position:fixed; bottom:20px; right:20px; border-radius:50%; width:50px; height:50px; background:var(--neon); cursor:pointer;" onclick="openModal()">+</button>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:100;">
        <div style="background:#000; border:1px solid var(--neon); padding:20px;">
            <input type="text" id="p-name" placeholder="Nomi"><br><br>
            <input type="file" id="p-file"><br><br>
            <button onclick="saveP()">YUKLASH</button>
            <button onclick="closeModal()">Yopish</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOfHOeEY_z5_UIZ3iX37-ghsn3GPCCcaw",
            authDomain: "roblox-trade-plaza.firebaseapp.com",
            projectId: "roblox-trade-plaza",
            storageBucket: "roblox-trade-plaza.firebasestorage.app",
            messagingSenderId: "357233560307",
            appId: "1:357233560307:web:f7b972214189aa04278586"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let user = null;

        // Login
        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('user-display').innerText = u.displayName;
                loadAdmin();
            } else {
                signInWithPopup(auth, provider);
            }
        });

        // Navigation
        window.show = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // Postlar
        window.openModal = () => document.getElementById('modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('modal').style.display = 'none';

        window.saveP = async () => {
            const name = document.getElementById('p-name').value;
            const file = document.getElementById('p-file').files[0];
            if(!name || !file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                await addDoc(collection(db, "posts"), { name, img: e.target.result, owner: user.email });
                closeModal();
            };
            reader.readAsDataURL(file);
        };

        onSnapshot(collection(db, "posts"), (snap) => {
            const list = document.getElementById('wiki-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `
                    <div class="card">
                        ${(user && p.owner === user.email) ? `<button class="del-btn" onclick="delPost('${d.id}')">X</button>` : ''}
                        <img src="${p.img}">
                        <div style="padding:5px;">${p.name}</div>
                    </div>`;
            });
        });

        window.delPost = async (id) => { if(confirm("O'chirish?")) await deleteDoc(doc(db, "posts", id)); };

        // Global Chat
        window.sendG = async () => {
            const val = document.getElementById('g-input').value;
            if(val && user) {
                await addDoc(collection(db, "global"), { name: user.displayName, text: val });
                document.getElementById('g-input').value = "";
            }
        };

        onSnapshot(collection(db, "global"), (snap) => {
            const box = document.getElementById('g-msgs');
            box.innerHTML = "";
            snap.forEach(d => box.innerHTML += `<div><b>${d.data().name}:</b> ${d.data().text}</div>`);
            box.scrollTop = box.scrollHeight;
        });

        // Admin Chat
        window.sendA = async () => {
            const val = document.getElementById('a-input').value;
            if(val && user) {
                await addDoc(collection(db, "admin_chats", user.email, "msgs"), { name: user.displayName, text: val });
                document.getElementById('a-input').value = "";
            }
        };

        function loadAdmin() {
            onSnapshot(collection(db, "admin_chats", user.email, "msgs"), (snap) => {
                const box = document.getElementById('a-msgs');
                box.innerHTML = "";
                snap.forEach(d => box.innerHTML += `<div><b>${d.data().name}:</b> ${d.data().text}</div>`);
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
